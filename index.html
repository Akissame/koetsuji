	<style>
		/* ── App launcher ─────────────────────────────── */
		.app-launcher {
			position: fixed;
			top: 28px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 1000;
			display: flex;
			gap: 12px;
			align-items: center;
		}

		.app-btn {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			padding: 10px 20px;
			border-radius: 24px;
			text-decoration: none;
			font-family: "Orbitron", sans-serif;
			font-size: 0.75rem;
			font-weight: 600;
			letter-spacing: 0.3px;
			transition: all 0.3s ease;
			backdrop-filter: blur(12px);
			white-space: nowrap;
			min-height: 42px;
			box-sizing: border-box;
			border: 1px solid;
		}

		/* Retro Achievements — magenta (identidad del juego retro) */
		.app-btn.retro {
			background: rgba(0, 0, 0, 0.75);
			border-color: #ff00ff;
			color: #ff00ff;
		}

		.app-btn.retro:hover {
			background: rgba(255, 0, 255, 0.15);
			color: #00ffff;
			border-color: #00ffff;
			box-shadow: 0 0 18px rgba(0, 255, 255, 0.4);
			transform: translateY(-2px);
		}

		/* Aegis — azul (identidad de la app de contraseñas) */
		.app-btn.aegis {
			background: rgba(0, 0, 0, 0.75);
			border-color: #3B82F6;
			color: #3B82F6;
		}

		.app-btn.aegis:hover {
			background: rgba(59, 130, 246, 0.15);
			color: #26D0CE;
			border-color: #26D0CE;
			box-shadow: 0 0 18px rgba(38, 208, 206, 0.4);
			transform: translateY(-2px);
		}

		.app-btn i { font-size: 14px; flex-shrink: 0; }

		/* ── Responsive ───────────────────────────────── */
		@media (max-width: 768px) {
			.app-launcher {
				top: 16px;
				gap: 8px;
				padding: 0 12px;
				width: 100%;
				justify-content: center;
				left: 0;
				transform: none;
			}

			.app-btn {
				padding: 10px 16px;
				font-size: 0.7rem;
				min-height: 44px;
				flex: 1;
				max-width: 180px;
				justify-content: center;
			}

			.app-btn i { font-size: 13px; }

			h1 {
				font-size: clamp(40px, 8vw, 60px) !important;
				width: 90% !important;
				left: 50% !important;
				margin-left: -45% !important;
				top: 62% !important;
			}

			h2 {
				font-size: clamp(45px, 9vw, 65px) !important;
				top: 62% !important;
				margin-right: -4em !important;
			}

			#retrobg-sunWrap { width: 60% !important; margin-bottom: -10% !important; }
			#retrobg-sun { box-shadow: 0 0 60px 45px var(--glow-color) !important; }
			#retrobg-cityWrap { width: 80% !important; }
			#retrobg-lines { opacity: 0.7; }
		}

		@media (max-width: 480px) {
			.app-launcher { top: 12px; gap: 6px; }
			.app-btn { font-size: 0.65rem; padding: 9px 12px; min-height: 42px; }
			.app-btn span.label { display: none; }
			.app-btn i { font-size: 16px; }
		}

		@media (max-width: 768px) and (orientation: landscape) {
			.app-launcher { top: 10px; }
			.app-btn { padding: 8px 14px; min-height: 36px; font-size: 0.65rem; }

			h1 { top: 42% !important; font-size: clamp(30px, 6vw, 45px) !important; }
			h2 { top: 52% !important; font-size: clamp(35px, 7vw, 50px) !important; }
		}
	</style>
</head>
